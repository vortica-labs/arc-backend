services:
  - type: web
    name: arc-modular-backend
    runtime: node
    rootDir: arc_-main/modular-backend
    buildCommand: npm install && npm run build
    preDeployCommand: npm run preflight:push-release
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_USERNAME
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: PUSH_NOTIFICATION_PROVIDER
        value: expo
      - key: EXPO_ACCESS_TOKEN
        sync: false
      - key: EXPO_PUSH_SECURITY_MODE
        value: enabled
      - key: APNS_TEAM_ID
        sync: false
      - key: APNS_KEY_ID
        sync: false
      - key: APNS_PRIVATE_KEY_BASE64
        sync: false
      - key: APNS_BUNDLE_ID
        value: com.arcSquadHunt
      - key: APNS_VOIP_TOPIC
        value: com.arcSquadHunt.voip
      - key: APNS_ENVIRONMENT
        value: production
      - key: MAX_CALL_DURATION_SECONDS
        value: 14400
      - key: CORS_ORIGIN
        value: https://arc.squadhunt.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://arc-backend-1.onrender.com/api/auth/google/callback
      - key: CLIENT_URL
        value: https://arc.squadhunt.com
      - key: SMTP_HOST
        value: smtp.hostinger.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_SECURE
        value: true
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: "ARC <noreply@squadhunt.com>"
      - key: ZEGOCLOUD_APP_ID
        sync: false
      - key: ZEGOCLOUD_SERVER_SECRET
        sync: false
